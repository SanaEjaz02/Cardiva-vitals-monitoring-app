name: cardiva
description: AI-Based Wearable Health Monitoring and Emergency Response System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  google_sign_in: ^6.2.2
  sign_in_with_apple: ^6.1.3

  # SMS via OS (replaces Twilio — free, no API key)
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8
  google_fonts: ^6.1.0
  shared_preferences: ^2.3.2
  image_picker: ^1.1.2
  path_provider: ^2.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
