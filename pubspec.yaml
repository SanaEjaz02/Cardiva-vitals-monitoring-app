name: cardiva
description: AI-Based Wearable Health Monitoring and Emergency Response System.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  flutter_riverpod: ^2.5.1

  # Charts
  fl_chart: ^0.68.0

  # Utilities
  intl: ^0.19.0
  uuid: ^4.4.2

  # SMS via OS (replaces Twilio — free, no API key)
  url_launcher: ^6.3.0

  cupertino_icons: ^1.0.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2

flutter:
  uses-material-design: true
